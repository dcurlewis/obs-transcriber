[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Fast unit tests (run always)
    integration: Slow integration tests (run in CI)
addopts =
    --verbose
    --strict-markers
    --cov=scripts
    --cov=web
    --cov-report=term-missing
    --cov-report=html
